# Self-contained stack: neurosurfer + a local, self-hosted Langfuse.
#
# Brings up neurosurfer wired to its own Langfuse instance so traces land
# locally (no Langfuse Cloud, no "Fast" dashboard cache / ingestion lag).
#
#   docker compose -f docker-compose.langfuse.yml up -d
#
# Langfuse UI:  http://localhost:3000   (login: admin@neurosurfer.local / neurosurfer)
# Neurosurfer:  http://localhost:8081
#
# On first boot LANGFUSE_INIT_* provisions the org/project/user and the API
# key pair below, so neurosurfer can send traces immediately — no manual UI
# setup. Change every value marked # CHANGEME before exposing this anywhere.
#
# NOTE: this reuses the same host ports as the standalone langfuse stack in
# ~/workspace/langfuse (3000/5432/6379/8123/9090/...). Stop that stack first
# (`docker compose -p langfuse down`) or the two will fight over the ports.
name: neurosurfer

x-langfuse-env: &langfuse-env
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres # CHANGEME
  SALT: ${LANGFUSE_SALT:-944c50276a1ede23d5923aecb833bf4d} # CHANGEME
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-f4a8a55c4e11d78a41e404af31170433549dd950eb05b67e2370c929eb0e4449} # CHANGEME: openssl rand -hex 32
  TELEMETRY_ENABLED: "true"
  LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
  CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
  CLICKHOUSE_URL: http://clickhouse:8123
  CLICKHOUSE_USER: clickhouse
  CLICKHOUSE_PASSWORD: clickhouse # CHANGEME
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret # CHANGEME
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret # CHANGEME
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://localhost:9090
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_AUTH: myredissecret # CHANGEME
  NEXTAUTH_URL: http://localhost:3000

services:
  neurosurfer:
    build:
      context: .
      dockerfile: Dockerfile
    image: neurosurfer:V1.0.0
    container_name: neurosurfer
    depends_on:
      langfuse-web:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - NEUROSURFER_BACKEND_APP=neurosurfer.examples.quickstart_app:ns
      - NEUROSURFER_BACKEND_HOST=0.0.0.0
      - NEUROSURFER_BACKEND_PORT=8081
      - VLLM_BASE_URL=http://localhost:8001/v1
      - MODEL_NAME=Qwen3-8B-unsloth-bnb-4bit
      - NS_CORS_ALLOW_CREDENTIALS=true
      - NS_CORS_ORIGINS="http://localhost:5173,http://192.168.0.198:5173"
      # ── observability → local Langfuse (overrides any LANGFUSE_* in .env) ──
      - NEUROSURFER_EXPORTERS=langfuse
      - LANGFUSE_HOST=http://langfuse-web:3000
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-neurosurfer-local}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-neurosurfer-local}
    ports:
      - "8081:8081"
    volumes:
      - /home/nomi/workspace/Model_Weights:/models:ro
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    runtime: nvidia

  # ── Langfuse stack ──────────────────────────────────────────────────────
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    restart: always
    depends_on: &langfuse-depends-on
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-BAUas1tFG3meOWLOWfwTgbypj8E9g8k7} # CHANGEME
      # Headless bootstrap: creates org/project/user + the API keys neurosurfer uses.
      LANGFUSE_INIT_ORG_ID: neurosurfer
      LANGFUSE_INIT_ORG_NAME: Neurosurfer
      LANGFUSE_INIT_PROJECT_ID: neurosurfer
      LANGFUSE_INIT_PROJECT_NAME: neurosurfer
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_INIT_PROJECT_PUBLIC_KEY:-pk-lf-neurosurfer-local}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_INIT_PROJECT_SECRET_KEY:-sk-lf-neurosurfer-local}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@neurosurfer.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-neurosurfer} # CHANGEME
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    restart: always
    depends_on: *langfuse-depends-on
    ports:
      - "127.0.0.1:3030:3030"
    environment:
      <<: *langfuse-env

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    restart: always
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse # CHANGEME
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    ports:
      - "127.0.0.1:8123:8123"
      # native port 9000 intentionally not published — reached over the docker network.
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  minio:
    image: cgr.dev/chainguard/minio
    restart: always
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret # CHANGEME
    ports:
      - "9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 1s
      timeout: 5s
      retries: 5
      start_period: 1s

  redis:
    image: docker.io/redis:7
    restart: always
    command: >
      --requirepass myredissecret
      --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10

  postgres:
    image: docker.io/postgres:17
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres # CHANGEME
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  redis_data:
