site_name: neurosurfer
site_description: Build intelligent apps that blend LLM reasoning, tools, and retrieval — with an OpenAI-compatible gateway.
site_author: Neurosurfer Team
site_url: https://NaumanHSA.github.io/neurosurfer

repo_name: NaumanHSA/neurosurfer
repo_url: https://github.com/NaumanHSA/neurosurfer
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Neurosurfer Team

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: --md-primary-fg-color
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: --md-primary-fg-color
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  font:
    text: Roboto
    code: Roboto Mono

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - toc.follow

  logo: assets/logo/neurosurfer_logo_white_hollow.png

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NaumanHSA/neurosurfer
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/neurosurfer/

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
    - Providers: guides/providers.md
    - Agents: guides/agents.md
    - Tools: guides/tools.md
    - RAG: guides/rag.md
    - Graph & Workflows: guides/graph-workflows.md
    - Architect: guides/architect.md
    - MCP: guides/mcp.md
  - Server:
    - server/index.md
    - Backends: server/backends.md
    - Hooks: server/hooks.md
  - CLI: cli.md
  - Tutorials: tutorials.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra_css:
  - stylesheets/extra.css
