    - Background Tasks: guides/tasks.md
    - Context & Memory: guides/context.md
    - RAG: guides/rag.md
    - Graph & Workflows: guides/graph-workflows.md
    - MCP: guides/mcp.md
    - Configuration: guides/configuration.md
