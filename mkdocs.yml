site_name: neurosurfer
site_description: Build intelligent apps that blend LLM reasoning, tools, and retrieval — with an OpenAI-compatible gateway.
site_author: Neurosurfer Team
site_url: https://NaumanHSA.github.io/neurosurfer

repo_name: NaumanHSA/neurosurfer
repo_url: https://github.com/NaumanHSA/neurosurfer
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Neurosurfer Team

theme:
  name: material
  palette:
    # Light mode is the default for every visitor (no prefers-color-scheme media
    # key → does not auto-follow the OS); the toggle switches + persists in localStorage.
    # Colours (monochrome black/white) are defined in stylesheets/extra.css.
    - scheme: default
      primary: --md-primary-fg-color
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode (opt-in via the toggle)
    - scheme: slate
      primary: --md-primary-fg-color
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

  # Monospace / coding-style type throughout.
  font:
    text: JetBrains Mono
    code: JetBrains Mono

  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.tracking
    # Top-level → tabs in the header; each tab's pages fill the left sidebar.
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.prune
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    # Fold each page's sub-sections into the left sidebar (nested under the page),
    # so they expand/collapse there instead of showing on the right.
    - toc.integrate

  logo: assets/logo/neurosurfer-logo-light.png

  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/NaumanHSA/neurosurfer
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/neurosurfer/

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

  # Python Markdown Extensions
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
      lang: en
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      enable_git_follow: false
      type: timeago

