name: architect
description: >
  5-node workflow-design graph: discover → clarify → plan → write_nodes → assemble.

inputs:
  - name: user_intent
    type: string
    required: true
    description: Plain-English description of what the user wants the new workflow to do.
  - name: answers
    type: object
    required: false
    description: >
      Pre-supplied clarifying answers (question_id → chosen text).
      When provided, the clarify node skips interactive input() prompts.
      Used by conversational front-ends that collect answers before starting the graph.
  - name: available_tools
    type: string
    required: false
    description: >
      Catalog of registered tools (name + description) that designed workflow nodes
      may use. Injected by ArchitectBuilder; interpolated into the plan / write_nodes
      prompts so the Architect only wires real, registered tools.

nodes:
  # ── Node 1: Discover ─────────────────────────────────────────────────────
  - id: discover
    kind: react
    purpose: >
      You are a workflow-design research agent. The user's request is:
      "{user_intent}"

      Research this specific request using web search. Find concrete information
      about relevant tools, APIs, patterns, and best practices for automating
      exactly what the user described. Stay focused on their stated intent.
    goal: >
      For the user's request ("{user_intent}"), produce a DiscoveryOutput with:
      (1) a one-sentence summary restating what the user wants to achieve,
      (2) key web findings directly relevant to their request, and
      (3) 3-4 clarifying questions (each with exactly 3 choices) covering scope,
      output format, and key design trade-offs specific to their use-case.
    expected_result: >
      A JSON object with EXACTLY these fields:
        "summary": one-sentence string confirming what the user wants to build,
        "web_findings": array of strings, each describing one relevant tool or pattern,
        "questions": array of 3-4 objects, each with "id" (snake_case), "question" (string),
          and "choices" (array of exactly 3 strings).
      Use field name "questions" — NOT "clarifying_questions".
    tools:
      - web_search
    mode: structured
    output_schema: neurosurfer.graph.builder.schemas:DiscoveryOutput

  # ── Node 2: Clarify ───────────────────────────────────────────────────────
  - id: clarify
    kind: function
    callable: neurosurfer.graph.builder.nodes.clarify:run
    depends_on:
      - discover
    mode: text

  # ── Node 3: Plan ──────────────────────────────────────────────────────────
  - id: plan
    kind: base
    purpose: >
      You are a senior workflow architect. The user wants to: "{user_intent}"

      Using the research findings and the user's answers to clarifying questions,
      design a complete multi-node workflow that solves exactly this request.

      NODE KINDS — use ONLY these two:
      - 'base'  = ONE LLM call. Use for any "write / generate / summarise / analyse /
        rewrite / classify" step that transforms text. A base node IS the LLM — it
        needs NO tool to produce text. (So there is no 'llm_writer' tool — just use a
        base node.)
      - 'react' = an LLM that can call tools in a loop. Use when the node must touch the
        filesystem, search, fetch URLs, or run commands.
      NEVER use 'function', 'python', or 'tool' kinds — you cannot write Python
      callables, so those nodes will fail validation.

      TOOLS — CRITICAL: react nodes may use ONLY the registered tools listed below.
      Do NOT invent tool names. Map intents to real tools:
        - read a file               → read_file     (NOT 'file_reader'/'get_file_content')
        - list / glob / WALK a tree → list_dir      (supports recursive globs like
          pattern='**/*.py' — use it to scan/walk a whole repo; there is NO
          'walk_directory'/'scan_directory'/'list_files')
        - search file contents      → search
        - run a shell command       → run_command   (parse code, call linters, mkdir, etc.)
        - write/overwrite a file    → write_file    (e.g. emit each .md doc file)
        - edit part of a file       → apply_edit
        - fetch a web page / API    → http / browse / web_search
      To "parse code", "scan a repo", "walk directories", or "export files", use a
      'react' node with run_command + read_file + list_dir + write_file — do NOT
      invent a tool for it.
      Available tools:
      {available_tools}

      OTHER PRINCIPLES:
      - Prefer several focused nodes over one monolithic node.
      - Every node needs a clear purpose, goal, and expected_result.
      - Wire depends_on edges to form a valid DAG.
      - Name the workflow concisely in snake_case.
    goal: >
      Produce a WorkflowPlan JSON for "{user_intent}": a name, description,
      NodePlan list (2-8 nodes), and outputs list.
    expected_result: >
      A valid WorkflowPlan. Each NodePlan must have id, kind, purpose, and
      depends_on. The outputs list names the final-output node IDs.
    depends_on:
      - discover
      - clarify
    mode: structured
    output_schema: neurosurfer.graph.builder.schemas:WorkflowPlan
    policy:
      max_new_tokens: 4096

  # ── Node 4: Write Nodes ───────────────────────────────────────────────────
  - id: write_nodes
    kind: react
    purpose: >
      You are a workflow node author. For each node in the WorkflowPlan, write
      a detailed agent YAML configuration and save it using the write_workflow_node
      tool. Call write_workflow_node once per node.

      KINDS — every node must be 'base' or 'react' (never 'function'/'python'/'tool').
        - 'base'  = a single LLM call (writing/generating/summarising text). No tools.
        - 'react' = an LLM with tools (filesystem, search, shell, web).

      TOOLS — CRITICAL: the 'tools' field may ONLY contain these registered tools.
      Do NOT invent tool names; write_workflow_node will reject unknown tools.
      Available tools:
      {available_tools}

      Each YAML must include:
        id: <node_id>
        kind: <base|react>
        purpose: <detailed system prompt — 2–4 sentences>
        goal: <specific objective>
        expected_result: <what success looks like>
        depends_on: [<ids>]
        tools: [<tool_names>]    # react nodes only; ONLY names from Available tools
        mode: <text|json|structured>
        output_schema: <module:Class>   # if mode=structured
    goal: >
      Call write_workflow_node exactly once per node in the plan.
      The workflow_name argument must match the WorkflowPlan.name field.
    expected_result: >
      One write_workflow_node call per node; all calls succeed with "Wrote node" confirmation.
    tools:
      - write_workflow_node
    depends_on:
      - plan
    mode: text

  # ── Node 5: Assemble ─────────────────────────────────────────────────────
  - id: assemble
    kind: function
    callable: neurosurfer.graph.builder.nodes.assemble:run
    depends_on:
      - plan
      - write_nodes
    mode: text

outputs:
  - assemble
