name: Feature Request
description: Suggest a new feature or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest an improvement!

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation or limitation you're running into.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see? How should it work from the user's perspective?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New built-in Task
        - New Provider adapter
        - New Tool
        - CLI / REPL
        - Task authoring / Task Builder
        - Context management / compaction
        - Guardrails / permissions
        - Docker / packaging
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you tried any workarounds or alternative approaches?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other information, screenshots, or examples that would help.
