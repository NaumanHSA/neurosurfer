name: Publish to PyPI

# Triggers on version tags: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_TOKEN secret needed.
        # Configure trusted publishing at: https://pypi.org/manage/account/publishing/
        # Set publisher: GitHub Actions, repo: NaumanHSA/neurosurfer, workflow: publish.yml
