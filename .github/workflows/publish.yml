name: Publish to PyPI

# Publishes when a GitHub Release is published, or manually from the Actions tab.
on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for trusted publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no PYPI_TOKEN secret needed.
        # Configure trusted publishing at: https://pypi.org/manage/account/publishing/
        # Set publisher: GitHub Actions, repo: NaumanHSA/neurosurfer, workflow: publish.yml
