name: CI

# Runs on pushes to main, on PRs, and manually from the Actions tab.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Lint, type-check, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,search]'   # search extra (bs4/lxml) is needed by the web-search tests

      - name: Lint (ruff)
        run: ruff check neurosurfer tests

      # Type checking (mypy) is intentionally not run in CI for now — re-add a
      # `mypy neurosurfer` step here (config lives in [tool.mypy]) when ready.

      - name: Test (pytest)
        run: pytest -q

  package:
    name: Build and validate package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*
